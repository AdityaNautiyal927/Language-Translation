
experiment_name: "en_hi_nmt_v1"
seed: 42
device: "cuda"      

paths:
  data_dir: "data"
  processed_dir: "data/processed"
  train_src: "data/train.en"
  train_tgt: "data/train.hi"
  val_src: "data/val.en"
  val_tgt: "data/val.hi"
  test_src: "data/test.en"
  test_tgt: "data/test.hi"
  vocab_src: "data/processed/vocab_src.json"
  vocab_tgt: "data/processed/vocab_tgt.json"
  checkpoint_dir: "checkpoints"
  best_model_path: "checkpoints/best_model.pt"
  log_dir: "logs"

# --- Tokenization & Vocabulary ---
tokenizer:
  src_lang: "en"
  tgt_lang: "hi"
  min_freq: 2              
  max_vocab_src: 32000
  max_vocab_tgt: 32000
  shared_vocab: false     

# --- Sequence Lengths ---
sequence:
  max_src_len: 100         
  max_tgt_len: 100         

# --- Model Architecture ---
model:
  embed_dim: 256           
  hidden_dim: 512          
  encoder_layers: 2
  decoder_layers: 1
  dropout: 0.3
  attention: "bahdanau"    
  bidirectional_encoder: true

# --- Training ---
training:
  epochs: 30
  batch_size: 128
  learning_rate: 0.001
  lr_scheduler: "reduce_on_plateau"   
  lr_patience: 3                       
  lr_factor: 0.5
  min_lr: 1.0e-6
  clip_grad_norm: 1.0      
  teacher_forcing_ratio: 0.5
  weight_decay: 1.0e-5
  label_smoothing: 0.1     

# --- Evaluation ---
evaluation:
  eval_every: 1            
  beam_size: 4             
  max_decode_len: 120      
  bleu_n: 4                

# --- Checkpointing ---
checkpointing:
  save_every: 1            
  keep_top_k: 3            
  resume_from: null        

# --- Logging ---
logging:
  use_tensorboard: true
  log_interval: 50         
  print_sample_every: 500  
