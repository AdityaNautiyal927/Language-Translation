# Model hyperparameters
model:
  embedding_dim: 256
  hidden_dim: 512
  dropout: 0.3
  num_layers: 1
  bidirectional_encoder: true

# Training settings
training:
  batch_size: 64
  learning_rate: 0.001
  num_epochs: 20
  teacher_forcing_ratio: 0.5
  clip_grad_norm: 1.0
  val_split: 0.1
  seed: 42

# Vocabulary settings
vocab:
  min_freq: 2          # Minimum word frequency to include in vocabulary
  max_vocab_size: 30000
  special_tokens:
    pad: "<PAD>"
    sos: "<SOS>"
    eos: "<EOS>"
    unk: "<UNK>"

# Inference settings
inference:
  max_output_len: 100   # Maximum tokens in generated translation
  beam_size: 1          # 1 = greedy decoding; >1 = beam search (future)

# Paths (relative to project root)
paths:
  saved_models_dir: saved_models
  vocab_dir: saved_models/vocabs
  eval_dir: saved_models/evals
